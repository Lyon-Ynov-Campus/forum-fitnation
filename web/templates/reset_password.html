{{define "title"}}Réinitialiser le mot de passe | FITNATION{{end}}

{{define "content"}}
<section class="auth-page">
  <div class="form-container">
    <div class="form-header">
      <h3>Nouveau mot de passe</h3>
      <p>Choisis un nouveau mot de passe pour ton compte.</p>
    </div>

    <form class="form" method="POST" action="/reset-password">
      <input type="hidden" name="token" value="{{.Token}}">
      <div class="input-container">
        <input type="password" name="password" autocomplete="new-password" placeholder="Nouveau mot de passe" required>
        <input type="password" name="password_confirm" autocomplete="new-password" placeholder="Confirmer le mot de passe" required>
      </div>
      <div class="button">
        <button class="submit" type="submit">Changer le mot de passe</button>
      </div>
    </form>

    <div class="signup">
      <a href="/login">Retour à la connexion</a>
    </div>
  </div>
</section>
{{end}}
