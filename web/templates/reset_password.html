{{define "title"}}Réinitialiser le mot de passe | FITNATION{{end}}

{{define "content"}}
<section class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="brand-mark">FN</span>
      <h1>Nouveau mot de passe</h1>
      <p>Choisis un nouveau mot de passe pour ton compte.</p>
    </div>

    <form class="form" method="POST" action="/reset-password">
      <input type="hidden" name="token" value="{{.Token}}">
      <label>
        Nouveau mot de passe
        <input type="password" name="password" autocomplete="new-password" required>
      </label>
      <label>
        Confirmer le mot de passe
        <input type="password" name="password_confirm" autocomplete="new-password" required>
      </label>
      <button class="button primary full" type="submit">Changer le mot de passe</button>
    </form>

    <p class="auth-link"><a href="/login">Retour à la connexion</a></p>
  </div>
</section>
{{end}}
