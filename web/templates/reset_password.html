<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialiser le mot de passe | FITNATION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="/">
        <span class="brand-mark">FN</span>
        <span>FITNATION</span>
      </a>
      <div class="nav-links">
        <a class="nav-login" href="/login">Connexion</a>
        <a href="/register">Inscription</a>
      </div>
    </nav>
  </header>

  <main class="app-main">
    <section class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <span class="brand-mark">FN</span>
          <h1>Nouveau mot de passe</h1>
          <p>Choisis un nouveau mot de passe pour ton compte.</p>
        </div>

        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}

        <form class="form" method="POST" action="/reset-password">
          <input type="hidden" name="token" value="{{.Token}}">
          <label>
            Nouveau mot de passe
            <input type="password" name="password" autocomplete="new-password" required minlength="8" placeholder="8 caractères minimum">
          </label>
          <label>
            Confirmer le mot de passe
            <input type="password" name="password_confirm" autocomplete="new-password" required placeholder="Répéter le mot de passe">
          </label>
          <button class="button primary full" type="submit">Changer le mot de passe</button>
        </form>

        <p class="auth-link"><a href="/login">Retour à la connexion</a></p>
      </div>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
