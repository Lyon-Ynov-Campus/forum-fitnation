{{ define "content" }}
<section class="error-page" style="text-align: center; padding: 12vh 20px; min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div class="container">
        <h1 style="font-size: 6rem; color: #ff4757; margin: 0; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.1);">{{ .ErrorCode }}</h1>
        <h2 style="font-size: 2rem; margin: 20px 0; color: #2f3542;">{{ .ErrorMessage }}</h2>
        <p style="margin-bottom: 40px; color: #747d8c; font-size: 1.1rem;">Oups, il semblerait qu'il y ait un problème ou que cette page n'existe pas.</p>
        <a href="/" class="btn" style="background: #2ed573; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; transition: all 0.3s ease;">
            Retour à l'accueil
        </a>
    </div>
</section>
{{ end }}
