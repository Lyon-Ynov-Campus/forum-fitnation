{{define "layout"}}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}FITNATION{{end}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="/">
        <span class="brand-mark">FN</span>
        <span>FITNATION</span>
      </a>

      <button class="nav-toggle" type="button" data-menu-toggle aria-label="Ouvrir le menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-links" data-menu>
        <a href="/">Feed</a>
       {{if .CurrentUser}}
<a href="/posts/new">Publier</a>
<a href="/network">R&#233;seau</a>
<a href="/profile">Profil</a>
<a href="/admin">Admin</a>
<form class="logout-form" method="POST" action="/logout">
  <button type="submit">D&#233;connexion</button>
</form>
{{else}}
        <a class="nav-login" href="/login">Connexion</a>
        <a href="/register">Inscription</a>
        {{end}}
      </div>
    </nav>
  </header>

  <main class="app-main">
    {{block "content" .}}{{end}}
  </main>

  <nav class="bottom-nav" aria-label="Navigation mobile">
    <a href="/">&#8962;</a>
    <a href="/network">&#9906;</a>
    {{if .CurrentUser}}
    <a class="bottom-create" href="/posts/new">+</a>
    <a href="/profile">&#9673;</a>
    {{else}}
    <a class="bottom-create" href="/login">+</a>
    <a href="/login">&#8618;</a>
    {{end}}
  </nav>

  <script src="/static/js/app.js"></script>
  {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
