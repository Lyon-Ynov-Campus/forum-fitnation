<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié | FITNATION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="/">
        <span class="brand-mark">FN</span>
        <span>FITNATION</span>
      </a>
      <div class="nav-links">
        <a class="nav-login" href="/login">Connexion</a>
        <a href="/register">Inscription</a>
      </div>
    </nav>
  </header>

  <main class="app-main">
    <section class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <span class="brand-mark">FN</span>
          <h1>Mot de passe oublié</h1>
          <p>Entre ton email pour recevoir un lien de réinitialisation.</p>
        </div>

        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}

        {{if .Message}}
        <p class="success">{{.Message}}</p>
        {{end}}

        {{if .DevLink}}
        <div class="card" style="margin-bottom: 20px; padding: 20px; border: 1px solid var(--accent-dim); background: var(--accent-glow); border-radius: var(--radius-md);">
          <p style="color: var(--accent); font-size: 0.85rem; margin-bottom: 12px; font-weight: 600;">Mode développement</p>
          <a href="{{.DevLink}}" class="button primary full">Réinitialiser le mot de passe</a>
        </div>
        {{end}}

        <form class="form" method="POST" action="/forgot-password">
          <label>
            Email
            <input type="email" name="email" autocomplete="email" required placeholder="ton@email.com">
          </label>
          <button class="button primary full" type="submit">Envoyer le lien</button>
        </form>

        <p class="auth-link"><a href="/login">Retour à la connexion</a></p>
      </div>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
