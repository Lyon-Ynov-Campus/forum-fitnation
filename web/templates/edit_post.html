{{define "title"}}Modifier le post | FITNATION{{end}}

{{define "content"}}
<section class="page-shell form-page">
  <div class="form-container">
    <div class="form-header">
      <h3>Modifier le post</h3>
    </div>

    <form id="edit-post-form" class="form" method="POST" action="/posts/{{.Post.ID}}/update">
      <div class="input-container">
        <input type="text" name="title" maxlength="120" value="{{.Post.Title}}" placeholder="Titre" required>
        <textarea name="content" rows="10" required>{{.Post.Content}}</textarea>
        <input type="url" name="image_url" placeholder="Lien de l'image">
        <input type="hidden" name="tags" data-tags-input>
        <div class="tag-row selectable">
          <button type="button" data-tag-option="Musculation">Musculation</button>
          <button type="button" data-tag-option="Cardio">Cardio</button>
          <button type="button" data-tag-option="Nutrition">Nutrition</button>
        </div>
        <div class="tag-add">
          <input type="text" data-new-tag placeholder="Ajouter un tag">
          <button class="edit-btn" type="button" data-add-tag>Ajouter</button>
        </div>
        <p class="selected-tags" data-selected-tags>Aucun tag sélectionné</p>
        <p>Visibilité : public</p>
      </div>
      <div class="button">
        <button class="submit" type="submit">Enregistrer</button>
      </div>
    </form>
  </div>
</section>
{{end}}
